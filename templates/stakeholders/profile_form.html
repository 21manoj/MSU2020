{% extends "base.html" %}
{% load widget_tweaks %}
{% block title %}Profile{% endblock %}
{% block content %}
<h1 class="mb-6 text-2xl font-bold">Your profile</h1>
<form method="post" class="max-w-xl space-y-4 rounded border bg-white p-6 shadow-sm">
  {% csrf_token %}
  {% for field in form %}
    <div>
      <label class="block text-sm font-medium" for="{{ field.id_for_label }}">{{ field.label }}</label>
      {% render_field field class="mt-1 block w-full rounded border px-3 py-2" %}
    </div>
  {% endfor %}
  <button type="submit" class="rounded bg-emerald-700 px-4 py-2 text-white">Save</button>
</form>
{% endblock %}
